<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(26, 26, 26);
            display: flex;
            justify-content: center;
        }

     .container{
        padding: 20px;
        background: rgb(37, 37, 37);
        border: solid rgb(97, 32, 32) 4px;
        width: 200px;
        border-radius: 10px;
        }
        
     .buttons{
        display: grid;
        grid-template-columns: repeat(4,1fr);
        margin-top: 10px;
        background: transparent;
        }

        button{
            background: transparent;
            border-radius: 20px;
            border: solid rgb(164, 160, 160) 1.5px;
            margin: 4px;
            text-align: center;  
            padding: 10px;
            color: rgba(255, 255, 255, 0.55);
            cursor: pointer;
            transition: all .2s ease;           
        }
        button:hover{
    transform: translateY(-1px);
    box-shadow: 0 0 10px rgba(242, 241, 241, 0.3);
    }
     button:active{
    transform: scale(1.1);
    }
    
        input{
            padding: 5%;
            width: 90%;
            background: transparent;
            border: solid 1px rgb(46, 147, 33);
            border-radius: 5px;
            text-align: end;
            color: white;
            box-shadow:0 0 8px rgba(46,147,33,.4);
        }
        .sty-1{
           border-color: blue;
        }
        .sty-2{
            background-color: rgba(255, 0, 0, 0.769);
            color: white;
        }
        .sty-3{
           background-color: blue;
           color: white;
        }
    </style>
</head>
<body>
    <div class= "container">
        <h3 style="color: red;">CALCULATOR</h3>
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button class="sty-2" data-value="AC">AC</button>  
            <button class="sty-1" data-value="%">%</button>  
            <button style="color: red;" class="sty-1" data-value="⌫">⌫</button>  
            <button class="sty-1" data-value="/">÷</button>  
            <button data-value="7">7</button>  
            <button data-value="8">8</button>  
            <button data-value="9">9</button>  
            <button class="sty-1" data-value="*">x</button>  
            <button data-value="4">4</button>  
            <button data-value="5">5</button>  
            <button data-value="6">6</button>  
            <button class="sty-1" data-value="-">-</button>  
            <button data-value="1">1</button>  
            <button data-value="2">2</button>  
            <button data-value="3">3</button>  
            <button class="sty-1" data-value="+">+</button>  
            <button data-value="00">00</button>  
            <button data-value="0">0</button>  
            <button data-value=".">.</button>  
            <button class="sty-3" data-value="=">=</button>  
        </div>
 </div>
 <script>   
  
 const display = document.getElementById("display");
 const buttons = document.querySelectorAll(".buttons button");

    buttons.forEach(function(button){
    button.addEventListener("click", function(){
    const value = button.dataset.value;

        if (value === "AC"){
            display.value = "";
        }
        else if (value === "⌫"){
            display.value = display.value.slice(0, -1);
        }

        else if (value === "="){
            if (display.value === "") return;
         try {
        display.value = eval(display.value);
        } catch {
        display.value = "Error";
        }
        }
        else {
            if (display.value === "Error"){
                display.value = "";
            }
            display.value += value;
        } 
    });
    });

    document.addEventListener("keydown" ,function(event){
     const key = event.key;

     if(key === "Escape"){
        display.value = "";
     }
     else if(key === "Backspace"){
        display.value = display.value.slice(0, -1);
     }
     else if(key === "Enter"){
         if (display.value === "") return;
         try {
        display.value = eval(display.value);
        } catch {
        display.value = "Error";
        }        
       }
       else if("1234567890+-/%*.".includes(key)){
        display.value += key;
       }
    });

    
 </script>
</body>
</html>
